<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOARDER PATROL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;}
canvas{display:block;background:#000;}
#btns{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;justify-content:center;}
#btns button{background:#111;color:#0f0;border:1px solid #0f0;padding:8px 11px;font-family:monospace;font-size:14px;border-radius:4px;cursor:pointer;user-select:none;}
#bnuke{background:#1a0800!important;color:#ff6600!important;border:2px solid #ff6600!important;}
#bshovel{background:#1a0f00!important;color:#c8a060!important;border:2px solid #8b6914!important;}
#bshoot{color:#ff0!important;border-color:#ff0!important;}
#bpause{color:#88aaff!important;border-color:#446688!important;font-size:10px!important;line-height:1.3;}
#hint{color:#333;font-size:10px;margin-top:4px;text-align:center;}
#back{position:fixed;top:10px;left:10px;color:#666;font-family:monospace;font-size:11px;text-decoration:none;border:1px solid #333;padding:4px 8px;border-radius:3px;z-index:5;}
#back:hover{color:#0f0;border-color:#0f0;}
#name-entry{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.88);display:none;align-items:center;justify-content:center;z-index:100;font-family:monospace;}
#name-entry .box{background:#000;border:2px solid #ffdd00;padding:24px 28px;text-align:center;min-width:280px;box-shadow:0 0 50px rgba(255,221,0,0.45);}
#name-entry h2{color:#ffdd00;font-size:18px;margin-bottom:4px;letter-spacing:2px;}
#name-entry .sub{color:#888;font-size:10px;margin-bottom:14px;letter-spacing:1px;}
#name-entry .score-line{color:#fff;font-size:12px;margin-bottom:16px;}
#name-entry .score-line strong{color:#ffdd00;font-size:26px;display:block;margin-top:4px;}
#name-entry input{background:#000;border:2px solid #00ff88;color:#00ff88;padding:10px 12px;font-family:monospace;font-size:18px;text-align:center;letter-spacing:4px;width:220px;text-transform:uppercase;}
#name-entry input:focus{outline:none;border-color:#ffdd00;color:#ffdd00;}
#name-entry .row{margin-top:14px;display:flex;gap:8px;justify-content:center;}
#name-entry button{background:#111;border:1px solid #00ff88;color:#00ff88;padding:8px 18px;font-family:monospace;font-size:13px;cursor:pointer;letter-spacing:1px;border-radius:3px;}
#name-entry button:hover{background:#001a08;}
#name-entry button:disabled{opacity:0.5;cursor:default;}
#name-entry button.skip{border-color:#666;color:#888;}
#name-entry button.skip:hover{background:#111;color:#aaa;}
#name-entry .status{margin-top:10px;font-size:10px;color:#888;min-height:14px;}
</style>
</head>
<body>
<a id="back" href="/">&larr; ARCADE</a>
<canvas id="c"></canvas>
<div id="btns">
  <button id="bleft">&#9664;</button>
  <button id="bup">&#9650;</button>
  <button id="bright">&#9654;</button>
  <button id="bdown">&#9660;</button>
  <button id="bshoot">&#9679; SHOOT</button>
  <button id="bnuke">&#9762; NUKE</button>
  <button id="bshovel">SHOVEL</button>
  <button id="bpause">BATHROOM<br>BREAK</button>
</div>
<div id="hint">Move: WASD/arrows &middot; Shoot: SPACE &middot; Nuke: N &middot; Shovel: X (near house) &middot; Pause: P</div>

<div id="name-entry">
  <div class="box">
    <h2>HIGH SCORE!</h2>
    <div class="sub">ENTER YOUR INITIALS</div>
    <div class="score-line">YOUR SCORE<strong id="ne-score">0</strong></div>
    <form id="ne-form">
      <input id="ne-input" type="text" maxlength="16" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="ARCADE LEGEND" />
      <div class="row">
        <button type="submit">SUBMIT</button>
        <button type="button" class="skip">SKIP</button>
      </div>
      <div class="status" id="ne-status"></div>
    </form>
  </div>
</div>

<script>
const cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
const W=620,H=500,MAX_ITEMS=9,KPW=15;
const DPR=Math.min(window.devicePixelRatio||1,2);
cvs.width=W*DPR;cvs.height=H*DPR;cvs.style.width=W+'px';cvs.style.height=H+'px';ctx.scale(DPR,DPR);

// === LEADERBOARD ====================================================
const LB_API='/api/scores';
const GAME_ID='hoarder-patrol';
let leaderboard=[];
let leaderboardLoaded=false;
let playerName=(()=>{try{return localStorage.getItem('arcadeName')||''}catch{return''}})();
let scoreSubmitted=false;
let nameEntryPending=false;
let lastSubmittedScore=0;

async function fetchLeaderboard(){
  try{
    const r=await fetch(`${LB_API}?game=${GAME_ID}&limit=10`,{cache:'no-store'});
    if(!r.ok)throw 0;
    const j=await r.json();
    leaderboard=Array.isArray(j.scores)?j.scores:[];
  }catch{leaderboard=[];}
  leaderboardLoaded=true;
}
async function submitScore(name,sc,wv,kl){
  const r=await fetch(LB_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAME_ID,name,score:sc,wave:wv,killed:kl})});
  if(!r.ok){let detail='';try{detail=(await r.json()).error||''}catch{};throw new Error(detail||('HTTP '+r.status));}
  await fetchLeaderboard();
}
function showNameEntry(){
  const ov=document.getElementById('name-entry');if(!ov)return;
  const inp=document.getElementById('ne-input');
  inp.value=playerName.slice(0,16);
  document.getElementById('ne-score').textContent=score;
  document.getElementById('ne-status').textContent='';
  ov.style.display='flex';
  nameEntryPending=true;
  setTimeout(()=>{inp.focus();inp.select();},60);
}
function hideNameEntry(){
  const ov=document.getElementById('name-entry');if(ov)ov.style.display='none';
  nameEntryPending=false;
}
setTimeout(()=>{
  const form=document.getElementById('ne-form');if(!form)return;
  const inp=document.getElementById('ne-input');
  const status=document.getElementById('ne-status');
  const submitBtn=form.querySelector('button[type=submit]');
  form.addEventListener('submit',async e=>{
    e.preventDefault();
    const cleaned=(inp.value||'').toUpperCase().replace(/[^A-Z0-9 \-_]/g,'').trim().slice(0,16);
    const name=cleaned||'ANON';
    playerName=name;
    try{localStorage.setItem('arcadeName',name)}catch{}
    submitBtn.disabled=true;submitBtn.textContent='SAVING...';status.textContent='';
    try{
      await submitScore(name,score,wave,killed);
      scoreSubmitted=true;lastSubmittedScore=score;
      hideNameEntry();
    }catch(err){
      status.textContent='Could not save (offline?). Try again or skip.';
      submitBtn.disabled=false;submitBtn.textContent='SUBMIT';
    }
  });
  form.querySelector('.skip').addEventListener('click',()=>{scoreSubmitted=true;hideNameEntry();});
},0);
fetchLeaderboard();
// =====================================================================

const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(f,d,t='square',v=0.07){try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}catch(e){}}
const sS=()=>{beep(700,.05,'square',.06);beep(350,.07,'square',.03)};
const sH=()=>beep(280,.07,'sawtooth',.06);
const sP=()=>{beep(900,.04,'sine',.06);beep(1200,.07,'sine',.04)};
const sHH=()=>{beep(90,.5,'sawtooth',.13);beep(70,.3,'triangle',.07)};
const sW=()=>{beep(440,.08);setTimeout(()=>beep(550,.08),100);setTimeout(()=>beep(660,.12),200)};
const sR=()=>{[150,220,310,460].forEach((f,i)=>setTimeout(()=>beep(f,.07,'sawtooth',.09),i*80))};
const sPsh=()=>beep(260,.12,'sine',.09);
const sN=()=>{beep(60,1,'sawtooth',.22);beep(90,.8,'sawtooth',.16);setTimeout(()=>beep(300,.5,'sine',.1),250)};
const sPick=()=>{beep(660,.06,'sine',.1);beep(880,.08,'sine',.08);beep(1100,.1,'sine',.06)};
const sSpl=()=>beep(400,.1,'square',.08);
const sBmp=()=>beep(200,.05,'triangle',.06);
const sBoss=()=>{beep(80,.5,'sawtooth',.2);setTimeout(()=>beep(60,.5,'sawtooth',.2),200)};
const sCmb=()=>beep(800,.1,'sine',.12);
const sSvS=()=>{beep(180,.12,'sawtooth',.09);beep(140,.1,'triangle',.07)};
const sSvD=()=>beep(160,.07,'sawtooth',.06);
const sSvG=()=>{beep(350,.08,'sine',.09);beep(500,.1,'sine',.07);beep(700,.12,'sine',.06)};
const sBdg=()=>{beep(523,.1,'sine',.1);beep(659,.1,'sine',.09);beep(784,.12,'sine',.08);setTimeout(()=>beep(1046,.2,'sine',.08),120)};

const BL=()=>ctx.beginPath(),STR=()=>ctx.stroke(),FIL=()=>ctx.fill();
const ML=(x,y)=>ctx.moveTo(x,y),LL=(x,y)=>ctx.lineTo(x,y);
const ARC=(x,y,r)=>ctx.arc(x,y,r,0,Math.PI*2);
const CR=(x,y,r)=>{BL();ARC(x,y,r);STR()};
const SL=(x1,y1,x2,y2)=>{BL();ML(x1,y1);LL(x2,y2);STR()};
const SC=(c)=>{ctx.strokeStyle=c},FC=(c)=>{ctx.fillStyle=c},LW=(w)=>{ctx.lineWidth=w};
const RR=(x,y,w,h)=>ctx.strokeRect(x,y,w,h);

const BADGES=[
  {w:1, n:"JUNK PATROL CADET",     d:"First day. Zero junk experience."},
  {w:2, n:"CLUTTER CRUSHER",       d:"The junk saw you coming."},
  {w:3, n:"DEPUTY DE-CLUTTER",     d:"Deputy of what? Still figuring that out."},
  {w:4, n:"PILE DRIVER",           d:"Not the machine. The vibe."},
  {w:5, n:"BEANIE BABY BUSTER",    d:"The hoarder's collection is scared."},
  {w:6, n:"VHS VIGILANTE",         d:"Still rewinding since 1994."},
  {w:7, n:"TREADMILL TERMINATOR",  d:"Nobody was using it anyway."},
  {w:8, n:"GNOME NEUTRALIZER",     d:"The garden finally rests."},
  {w:9, n:"FONDUE FUGITIVE FINDER",d:"Cold fondue. Hot pursuit."},
  {w:10,n:"THE DE-CRAPITATOR",     d:"This is a real title now."},
  {w:11,n:"ROCKING CHAIR RANGER",  d:"Stopped the rockiest crime."},
  {w:12,n:"CLUTTER COMMISSIONER",  d:"You run this house now."},

  {w:14,n:"JUNK PATROL GENERAL",   d:"Promoted. For some reason."},
  {w:15,n:"SUPREME DE-CLUTTERER",  d:"Peak humanity achieved."},

const XB=[
  {n:"OVER-ACHIEVER",         d:"Are you okay?"},
  {n:"EXCESSIVE FORCE",       d:"The junk is filing a complaint."},
  {n:"TOO MUCH FREE TIME",    d:"The hoarder has given up."},
  {n:"HOARD TO STOP",         d:"This is just showing off."},
  {n:"CERTIFIED LEGEND",      d:"Beyond legend. Beyond myth."},
  {n:"BASICALLY A GOD",       d:"The house worships you."},
  {n:"IMMORTAL CLUTTERSLAYER",d:"One with the anti-junk."},

function getBadge(wv){if(wv<=BADGES.length)return BADGES[wv-1];const x=XB[(wv-BADGES.length-1)%XB.length];return{w:wv,...x};}
function getTier(wv){if(wv<=4)return'#c87832';if(wv<=8)return'#b8bfc8';if(wv<=12)return'#c8a060';return'#00ffdd';}

const M={
  hit:["Really? You let THAT in?!","That's never leaving.","You had ONE job.","Bold strategy. Letting it in.","Did you even try?","The hoarder pumped their fist."],
  hi60:["This is getting embarrassing.","We're one fondue set from condemned.","The hoarder is living rent-free."],
  hi80:["MAYDAY. USE A NUKE.","You ARE the show now.","USE THE SHOVEL IF YOU HAVE ONE."],
  combo:["OKAY that was sick.","Combo energy.","The junk is scared."],
  maxCombo:["UNSTOPPABLE.","Are you even human?","The hoarder is crying.","x4?! Go off."],
  boss:["Oh great. The HEAD hoarder.","The Mega Hoarder has logged on."],
  nuke:["NUCLEAR OPTION. Elegant.","The junk never saw it coming."],
  pu:{spd:["SPEED BOOST!","Zoom zoom."],frz:["FREEZE! Breathe.","Even the 17 cats are frozen."],rap:["RAPID FIRE!","Triple shots!"],shd:["HOUSE SHIELD UP!","Bounce city."]},
  deflect:["INTO THE VOID. Goodbye.","Not your problem anymore."],
  well:["Clean house. For now.","The hoarder is spiraling."],
  split:["It SPLIT!","Oh great, TWO of them."],
  truck:["Moving truck! Bulk junk incoming.","The hoarder ordered WHOLESALE."],
  garage:["GARAGE SALE! Junk slowing.","Suspicious. But okay."],
  sv_start:["SHOVELING! Get that junk OUT.","The hoarder is HORRIFIED.","Dig dig dig."],
  sv_done:["Done shoveling. Go defend.","House can breathe. For now."],
  sv_get:["Shovel acquired! Get near the house.","SHOVEL GET!"],
  sv_none:["No shovel. Kill a hoarder first."],
  sv_far:["Get near the house to shovel!"],
  idle:["The junk won't stop itself.","That treadmill has been coming forever.","Don't get cocky.","If you have a shovel, USE IT."],
};
const pick=a=>a[Math.floor(Math.random()*a.length)];
let talk={msg:'',timer:0,col:'#ccc'};
function say(msg,col,dur,force){if(!force&&talk.timer>80)return;talk={msg,col:col||'#ccc',timer:dur||200};}

const PUC={spd:'#ffff00',frz:'#00ffff',rap:'#ff8800',shd:'#00ff88'};
const PUL={spd:'SPEED',frz:'FREEZE',rap:'RAPID',shd:'SHIELD'};

const DF={
  cat:(x,y,c)=>{SC(c);LW(1.5);CR(x,y-7,5);BL();ML(x-4,y-11);LL(x-2,y-15);LL(x,y-11);ML(x,y-11);LL(x+2,y-15);LL(x+4,y-11);STR();BL();ctx.ellipse(x,y+2,4,6,0,0,Math.PI*2);STR();BL();ML(x+4,y+5);ctx.quadraticCurveTo(x+12,y+3,x+10,y-2);STR();FC(c);BL();ARC(x-2,y-8,1.2);FIL();BL();ARC(x+2,y-8,1.2);FIL();},
  tv:(x,y,c)=>{SC(c);LW(1.5);RR(x-17,y-14,34,28);RR(x-13,y-10,26,20);SL(x-9,y-7,x+9,y+7);SL(x+9,y-7,x-9,y+7);SL(x-6,y+14,x-6,y+21);SL(x+6,y+14,x+6,y+21);SL(x-9,y+21,x+9,y+21);},
  vhs:(x,y,c)=>{SC(c);LW(1.5);RR(x-13,y-9,26,18);CR(x-5,y+2,4);CR(x+5,y+2,4);BL();ML(x-6,y-9);LL(x-6,y-13);LL(x+6,y-13);LL(x+6,y-9);STR();SL(x-9,y-5,x-9,y+2);},
  treadmill:(x,y,c)=>{SC(c);LW(1.5);RR(x-22,y-5,44,10);CR(x-17,y+5,7);CR(x+17,y+5,7);SL(x-10,y-5,x-14,y-20);SL(x+10,y-5,x+14,y-20);SL(x-14,y-20,x+14,y-20);SL(x,y-5,x,y-12);},
  gnome:(x,y,c)=>{SC(c);LW(1.5);BL();ML(x-8,y-4);LL(x,y-22);LL(x+8,y-4);ctx.closePath();STR();CR(x,y+2,5);BL();ML(x-6,y+6);LL(x,y+16);LL(x+6,y+6);STR();BL();ML(x-5,y+16);LL(x-7,y+26);LL(x+7,y+26);LL(x+5,y+16);ctx.closePath();STR();FC(c);BL();ARC(x,y+1,2);FIL();},
  magazines:(x,y,c)=>{SC(c);LW(1.5);for(let i=2;i>=0;i--){RR(x-13+i*2,y-9+i*3,26,18);SL(x-9+i*2,y-4+i*3,x+7+i*2,y-4+i*3);SL(x-9+i*2,y+1+i*3,x+2+i*2,y+1+i*3);}},
  fondue:(x,y,c)=>{SC(c);LW(1.5);BL();ML(x-11,y-5);LL(x-9,y+11);LL(x+9,y+11);LL(x+11,y-5);ctx.closePath();STR();SL(x-14,y-7,x+14,y-7);SL(x-11,y-2,x-16,y-2);SL(x+11,y-2,x+16,y-2);SL(x-4,y-7,x-4,y-18);SL(x+4,y-7,x+4,y-18);},
  snuggie:(x,y,c)=>{SC(c);LW(1.5);BL();ctx.arc(x,y-12,8,Math.PI,0);STR();SL(x-8,y-12,x+8,y-12);BL();ML(x-8,y-12);LL(x-13,y+14);LL(x+13,y+14);LL(x+8,y-12);ctx.closePath();STR();SL(x-8,y-3,x-18,y+3);SL(x+8,y-3,x+18,y+3);},
  waterpik:(x,y,c)=>{SC(c);LW(1.5);RR(x-6,y-16,12,26);BL();ML(x+6,y-10);LL(x+14,y-15);LL(x+14,y-20);STR();SL(x+11,y-13,x+17,y-19);SL(x+17,y-13,x+11,y-19);CR(x,y-3,3);},
  bear:(x,y,c)=>{SC(c);LW(1.5);CR(x,y-12,9);CR(x-7,y-19,4);CR(x+7,y-19,4);BL();ctx.ellipse(x,y+5,10,13,0,0,Math.PI*2);STR();SL(x-10,y,x-19,y+7);SL(x+10,y,x+19,y+7);BL();ctx.ellipse(x,y-9,4,3,0,0,Math.PI*2);STR();FC(c);BL();ARC(x-3,y-14,1.5);FIL();BL();ARC(x+3,y-14,1.5);FIL();},
  flamingo:(x,y,c)=>{SC(c);LW(1.5);BL();ctx.ellipse(x+3,y-3,8,6,-0.4,0,Math.PI*2);STR();BL();ML(x+2,y-8);ctx.quadraticCurveTo(x-4,y-17,x-2,y-23);STR();CR(x-2,y-25,4);SL(x-4,y-25,x-10,y-23);BL();ML(x+4,y+3);LL(x+4,y+18);LL(x+1,y+22);STR();BL();ML(x+4,y+9);LL(x+10,y+18);LL(x+13,y+22);STR();},
  hoop:(x,y,c)=>{LW(3);SC(c);CR(x,y,14);LW(1.5);SC(c+'88');CR(x,y,10);},
  bike:(x,y,c)=>{SC(c);LW(1.5);CR(x-16,y+8,9);CR(x+16,y+8,9);BL();ML(x-16,y+8);LL(x,y-6);LL(x+16,y+8);ML(x,y-6);LL(x-6,y+8);STR();SL(x-4,y-6,x-10,y-9);SL(x-10,y-9,x-14,y-9);SL(x+16,y+8,x+18,y-4);SL(x+14,y-4,x+23,y-4);},
  spoon:(x,y,c)=>{SC(c);LW(1.5);CR(x,y-10,6);BL();ML(x-2,y-4);LL(x-2,y+14);LL(x+2,y+14);LL(x+2,y-4);STR();},
  coupon:(x,y,c)=>{SC(c);LW(1.5);RR(x-11,y-8,22,16);SL(x-7,y-3,x+7,y-3);SL(x-7,y+2,x+3,y+2);FC(c);ctx.font='bold 8px monospace';ctx.textAlign='center';ctx.fillText('%',x,y+11);},
  tree:(x,y,c)=>{SC(c);LW(1.5);BL();ML(x-11,y+6);LL(x,y-16);LL(x+11,y+6);ctx.closePath();STR();RR(x-3,y+6,6,10);FC(c);BL();ARC(x-4,y,2);FIL();BL();ARC(x+5,y-5,2);FIL();BL();ARC(x-1,y-9,2);FIL();},
  doll:(x,y,c)=>{SC(c);LW(1.5);CR(x,y-14,7);BL();ML(x-4,y-7);LL(x-12,y+14);LL(x+12,y+14);LL(x+4,y-7);ctx.closePath();STR();SL(x-4,y-4,x-13,y+2);SL(x+4,y-4,x+13,y+2);SL(x-5,y-20,x-8,y-12);SL(x+5,y-20,x+8,y-12);},
  phone:(x,y,c)=>{SC(c);LW(1.5);RR(x-12,y,24,14);CR(x+2,y+7,5);BL();ML(x-10,y-2);ctx.quadraticCurveTo(x-14,y-14,x-4,y-16);ctx.quadraticCurveTo(x+8,y-14,x+10,y-2);STR();CR(x-8,y-4,3);CR(x+8,y-4,3);},
  beanie:(x,y,c)=>{SC(c);LW(1.5);BL();ctx.ellipse(x,y,10,7,0.3,0,Math.PI*2);STR();SL(x+8,y-4,x+13,y-8);RR(x+11,y-11,5,5);FC(c);BL();ARC(x-2,y-1,2);FIL();},
  bowling:(x,y,c)=>{SC(c);LW(1.5);CR(x,y,12);FC(c);BL();ARC(x-4,y-4,2.2);FIL();BL();ARC(x+4,y-4,2.2);FIL();BL();ARC(x,y+5,2.2);FIL();},

  ex.camItems.forEach(ci=>{
    const ef=ex.frame-ci.startDelay; if(ef<0)return;
    ci.t=Math.min(1,ef/ci.dur);
    ci.x=HX+ci.dx*(W*.72)*ci.t; ci.y=HY+ci.dy*(H*.72)*ci.t;
    ci.scale=.4+ci.t*5.0;

  });

}

    ctx.font='bold 34px monospace';FC('#ff3333');ctx.fillText('HOARDER PATROL',W/2,98);
    ctx.font='18px monospace';FC('#ff6600');ctx.fillText('THE HOARDER WINS.',W/2,128);
    const snark=score<200?"The hoarder didn't even break a sweat.":score<600?"Did you try the shovel? Just asking.":score<1200?"You had them worried. Almost.":"The hoarder is genuinely shook. They won anyway.";
    ctx.font='11px monospace';FC('#666');ctx.fillText(snark,W/2,150);
    if(newHi){ctx.shadowBlur=12;ctx.shadowColor='#ffdd00';}
    ctx.font=newHi?'bold 28px monospace':'24px monospace';
    FC(newHi?'#ffdd00':'#fff');ctx.fillText('SCORE  '+score,W/2,188);
    ctx.shadowBlur=0;
    ctx.font='12px monospace';FC(newHi?'#ffaa00':'#00ff88');ctx.fillText('HI  '+hiScore,W/2,210);
    FC('#555');ctx.fillText('level '+wave+'  *  '+killed+' items busted',W/2,230);

    dBadgesGameOver();
    dLeaderboardGameOver();

    ctx.font='bold 13px monospace';FC('#ff0');ctx.textAlign='center';
    if(Math.floor(Date.now()/600)%2===0)ctx.fillText('PRESS ENTER OR R TO TRY AGAIN',W/2,H-18);
    return;
  }
  if(shake>0){ctx.save();ctx.translate(rnd(-shake,shake),rnd(-shake*.4,shake*.4));}
  dHouse();if(truck)dTruck(truck);items.forEach(dItem);hoarders.forEach(dHoarder);powerups.forEach(dPU);
  bullets.forEach(b=>{FC('#ff0');BL();ARC(Math.round(b.x),Math.round(b.y),2.5);FIL();});
  particles.forEach(p=>{ctx.globalAlpha=p.life/35;FC(p.col);ctx.fillRect(Math.round(p.x),Math.round(p.y),2,2);});
  ctx.globalAlpha=1;dPerson();
  houseRunners.forEach(dRunner);
  popups.forEach(p=>{ctx.globalAlpha=Math.min(1,p.life/50);FC(p.col||'#ff0');ctx.font=p.big?'bold 17px monospace':'bold 12px monospace';ctx.textAlign='center';ctx.fillText(p.text,Math.round(p.x),Math.round(p.y));});
  ctx.globalAlpha=1;
  if(nukeAnim){
    const na=nukeAnim,nf=na.frame;
    na.rays.forEach(r=>{
      if(r.len<=0)return;
      ctx.globalAlpha=Math.max(0,.92-nf*.025);
      SC(r.col);LW(r.w);
      BL();ML(HX,HY);LL(HX+Math.cos(r.a)*r.len,HY+Math.sin(r.a)*r.len);STR();
    });
    const ringAlpha=Math.max(0,.85-nf*.03);
    if(ringAlpha>0){ctx.globalAlpha=ringAlpha;SC('#ffff88');LW(4);BL();ctx.arc(HX,HY,na.radius,0,Math.PI*2);STR();}
    const ring2Alpha=Math.max(0,.5-nf*.025);
    if(ring2Alpha>0&&na.radius>30){ctx.globalAlpha=ring2Alpha;SC('#ff8800');LW(2);BL();ctx.arc(HX,HY,na.radius*.75,0,Math.PI*2);STR();}
    const coreR=Math.max(0,100-nf*7);
    if(coreR>2){const g=ctx.createRadialGradient(HX,HY,0,HX,HY,coreR*2);g.addColorStop(0,'rgba(255,255,200,.95)');g.addColorStop(.4,'rgba(255,180,0,.6)');g.addColorStop(1,'rgba(255,80,0,0)');FC(g);ctx.globalAlpha=.9;ctx.fillRect(HX-coreR*2,HY-coreR*2,coreR*4,coreR*4);}
    ctx.globalAlpha=1;
    if(na.flashAlpha>0){ctx.fillStyle=`rgba(255,240,100,${na.flashAlpha})`;ctx.fillRect(0,0,W,H);}
  }
  if(nukeFlash>0){ctx.fillStyle=`rgba(255,220,50,${(nukeFlash/28)*.7})`;ctx.fillRect(0,0,W,H);}
  if(gsAnnounce>0){ctx.textAlign='center';ctx.font='bold 20px monospace';FC(Math.floor(Date.now()/300)%2?'#ffdd00':'#ff8800');ctx.fillText('GARAGE SALE!  Items slowed!',W/2,H/2);}
  dBadge();
  ctx.textAlign='left';ctx.font='bold 14px monospace';FC('#00ff88');ctx.fillText('SCORE '+score,8,20);
  ctx.textAlign='right';ctx.fillText('HI '+hiScore,W-8,20);
  const m=getMult();if(combo>=3){ctx.textAlign='center';ctx.font='bold 15px monospace';FC(Math.floor(Date.now()/200)%2?'#ff8800':'#ffdd00');ctx.fillText('x'+m+' COMBO!',W/2,22);}
  dLevelBar();
  ctx.textAlign='center';ctx.font='bold 15px monospace';
  for(let i=0;i<3;i++){FC(i<nukes?'#ff6600':'#2a1000');ctx.fillText('N',W/2-24+i*16,H-27);}
  FC('#444');ctx.font='9px monospace';ctx.fillText('NUKES',W/2-8,H-15);
  for(let i=0;i<3;i++){const hs=i<shovels;SC(hs?'#c8a060':'#332211');FC(hs?'#c8a060':'#332211');LW(1.5);const sx=W/2+28+i*14,sy=H-31;SL(sx,sy-8,sx,sy+2);BL();ML(sx-4,sy-1);LL(sx+4,sy-1);LL(sx+3,sy+5);LL(sx-3,sy+5);ctx.closePath();if(hs)FIL();else STR();}
  FC('#444');ctx.font='9px monospace';ctx.textAlign='left';ctx.fillText('SHOVELS',W/2+20,H-15);
  if(shovelMode){const bw=100,pct=shovelFramesLeft/220,barX=HX-bw/2,barY=HY+HBH+30;FC('rgba(0,0,0,0.7)');ctx.fillRect(barX-2,barY-2,bw+4,12);const gc2=ctx.createLinearGradient(barX,0,barX+bw,0);gc2.addColorStop(0,'#8b6914');gc2.addColorStop(1,'#c8a060');FC(gc2);ctx.fillRect(barX,barY,bw*pct,8);SC('#c8a060');LW(1);ctx.strokeRect(barX,barY,bw,8);ctx.textAlign='center';ctx.font='bold 9px monospace';FC('#c8a060');ctx.fillText(nearH()?'SHOVELING...':'GET NEAR THE HOUSE',HX,barY+20);}
  ctx.textAlign='right';ctx.font='11px monospace';FC('#555');ctx.fillText(killed+' BUSTED',W-8,H-15);
  ctx.textAlign='left';FC(items.length>=MAX_ITEMS?'#ff4400':'#444');ctx.fillText('JUNK '+items.length+'/'+MAX_ITEMS,8,H-15);
  let ey=40;for(const[k,v]of Object.entries(effects)){if(v>0){ctx.textAlign='right';ctx.font='bold 9px monospace';FC(PUC[k]);ctx.fillText(PUL[k]+' '+(v/60|0)+'s',W-8,ey);ey+=13;}}
  if(garageSale&&gsAnnounce<=0){ctx.textAlign='right';ctx.font='bold 9px monospace';FC('#ffdd00');ctx.fillText('GARAGE SALE '+(gsTimer/60|0)+'s',W-8,ey);}
  if(rushActive){ctx.textAlign='center';ctx.font='bold 14px monospace';FC(Math.floor(Date.now()/280)%2?'#ff5500':'#ff9900');ctx.fillText('!! HOARDER RUSH !!',W/2,38);}
  if(talk.timer>0){const alpha=Math.min(1,talk.timer/20);ctx.globalAlpha=alpha;ctx.textAlign='center';ctx.font='bold 12px monospace';const tw=ctx.measureText(talk.msg).width;FC('rgba(0,0,0,0.88)');ctx.fillRect(W/2-Math.ceil(tw/2)-7,52,Math.ceil(tw)+14,18);FC(talk.col);ctx.fillText(talk.msg,W/2,64);ctx.globalAlpha=1;}
  if(shake>0)ctx.restore();
  if(paused){
    FC('rgba(0,0,0,0.84)');ctx.fillRect(0,0,W,H);ctx.textAlign='center';
    ctx.font='bold 26px monospace';FC('#88aaff');ctx.fillText('BATHROOM BREAK',W/2,H/2-62);
    ctx.font='bold 12px monospace';FC('#446688');ctx.fillText('(hoarder patrol temporarily suspended)',W/2,H/2-36);
    const pm=PMSG[Math.floor(Date.now()/3000)%PMSG.length];ctx.font='13px monospace';FC('#446677');ctx.fillText(pm,W/2,H/2);
    ctx.font='10px monospace';FC('#334455');ctx.fillText('SCORE: '+score+'   LEVEL: '+wave+'   CLUTTER: '+Math.floor(clutter)+'%   SHOVELS: '+shovels,W/2,H/2+28);
    if(badgesEarned.length>0){ctx.font='bold 9px monospace';FC('#664400');ctx.fillText('BADGES: '+badgesEarned.slice(-3).map(b=>'* '+b.n).join('  '),W/2,H/2+50);}
    ctx.font='bold 12px monospace';FC('#ff0');if(Math.floor(Date.now()/600)%2===0)ctx.fillText('PRESS P OR BATHROOM BREAK TO RESUME',W/2,H/2+82);
  }
}
function loop(){requestAnimationFrame(loop);update();draw();}
loop();
</script>
</body>
